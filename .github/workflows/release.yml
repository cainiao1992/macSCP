name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.2.1
  workflow_dispatch:  # Allows manual trigger from GitHub UI
    inputs:
      version:
        description: 'Version number (e.g., 0.2.1)'
        required: true
        type: string

env:
  APP_NAME: macSCP
  SCHEME: macSCP
  PROJECT: macSCP.xcodeproj

jobs:
  build:
    name: Build and Create DMG
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          BUILD_NUMBER=$(date +%Y%m%d)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - name: Update version in project
        run: |
          # Update MARKETING_VERSION and CURRENT_PROJECT_VERSION
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.version }}/" ${{ env.PROJECT }}/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${{ steps.version.outputs.build_number }}/" ${{ env.PROJECT }}/project.pbxproj

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }}

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            -exportPath build \
            -exportOptionsPlist exportOptions.plist

      - name: Create DMG
        run: |
          DMG_NAME="${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg"

          # Create staging directory
          mkdir -p dmg-staging
          cp -R "build/${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # Create DMG
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
          echo "Created: $DMG_NAME"
          ls -lh "$DMG_NAME"
        id: dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}
          path: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg
          draft: false
          generate_release_notes: true
          name: ${{ env.APP_NAME }} v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
